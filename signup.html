
<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="stylesheet" href="./styles/main.css">


        <title>Signup</title>

    </head>
    <body>
        <section class="notifications-container"></section>
        <section class="loader-container"></section>
        
        <form class="px-4 mt-4" id="signup-form">
            <label for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" required>

            <label for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password"  minlength="8"required>

            <label for="confirm-password">Confirm password</label>
            <input class="form-control" id="confirm-password" name="confirm-password" type="password" minlength="8" required>
           
            <button  class="btn btn-primary"submit">Signup</button>
            
        </form>

        
        <script type="module" src="signup.js" ></script>
    </body>
</html>
