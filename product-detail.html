<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./styles/main.css">


        <title>Product detail</title>
    </head>

    <body>
        <section class="notifications-container"></section>
        <section class="loader-container"></section>

        <section class="product-detail product px-4 mt-4 ">

            <img class="product-image hidden" alt="Product image">
            <h2 class="product-name"></h2>
            <p class="product-description"></p>
            <p class="product-price"></p>
            <p class="product-type"></p>

            <button class="delete-product-button hidden">Delete product</button>
        </section>

        <script type="module" src="./product-detail.js"></script>

    </body>
</html>
